name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/olx-scraper
            docker compose pull
            docker compose up -d
            sleep 5
            if docker ps --filter "name=olx-notifier" --filter "status=running" -q | grep -q .; then
              echo "✅ Container is running"
            else
              echo "❌ Container failed to start"
              docker logs olx-notifier --tail 20
              exit 1
            fi

      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ OLX Scraper deployed successfully
            Commit: ${{ github.event.workflow_run.head_sha }}
            Branch: main

      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ OLX Scraper deployment FAILED
            Commit: ${{ github.event.workflow_run.head_sha }}
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
